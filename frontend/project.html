<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="site-shell text-slate-900 antialiased">
    <nav class="site-nav fixed inset-x-0 top-0 z-50">
        <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
            <div class="nav-inner flex h-16 items-center justify-between">
                <a href="index.html" class="brand-mark text-xl font-extrabold tracking-tight uppercase">Abdallah</a>

                <div class="nav-links hidden md:flex text-sm font-semibold uppercase tracking-[0.08em]">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="projects.html" class="nav-link">Projects</a>
                </div>

                <div class="nav-cta hidden md:flex">
                    <a href="projects.html" class="primary-button">Projects</a>
                </div>

                <button id="mobile-menu-button" class="md:hidden p-2 rounded-lg" aria-label="Toggle navigation menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>

            <div id="mobile-menu" class="hidden md:hidden">
                <div class="flex flex-col gap-3 text-sm font-semibold uppercase tracking-[0.12em]">
                    <a href="index.html" class="mobile-link">Home</a>
                    <a href="projects.html" class="mobile-link">Projects</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 px-4">
        <div class="mx-auto max-w-4xl">
            <div id="project-detail" class="content-card"></div>
            <div class="mt-6 text-center">
                <a href="projects.html" class="secondary-button">Back to projects</a>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-200 bg-white px-4 py-10 text-center text-sm text-slate-500">
        <p>&copy; <span id="year"></span> Abdallah.</p>
    </footer>

    <script>
        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function safeUrl(value) {
            const candidate = String(value || '').trim();
            if (!candidate) {
                return '#';
            }

            if (candidate.startsWith('http://') || candidate.startsWith('https://')) {
                return candidate;
            }

            return '#';
        }

        function safeParseData() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('data');
            if (!raw) return null;
            try {
                return JSON.parse(decodeURIComponent(raw));
            } catch (e) {
                console.error('Failed to parse project data', e);
                return null;
            }
        }

        function renderProjectDetail(data) {
            const container = document.getElementById('project-detail');
            if (!container) return;

            if (!data) {
                container.innerHTML = '<h2 class="text-2xl font-extrabold">Project not found</h2><p class="text-slate-600 mt-2">No project data was provided. Return to the projects listing.</p>';
                return;
            }

            const image = escapeHtml(data.imageUrl || data.image || 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=900');
            const title = escapeHtml(data.title || 'Untitled');
            const description = escapeHtml(data.description || data.desc || 'No description provided.');
            const demoLink = safeUrl(data.demoLink || data.demo || '#');
            const sourceLink = safeUrl(data.sourceLink || data.source || '#');

            container.innerHTML = `
                <header class="project-hero">
                    <div style="position:relative;">
                        <img src="${image}" alt="${title}" class="w-full h-80 object-cover">
                        <div style="position:absolute;left:0;right:0;bottom:0;padding:1.5rem;background:linear-gradient(180deg,rgba(0,0,0,0) 0%, rgba(2,6,23,0.6) 60%);">
                            <h1 style="color:white;font-size:clamp(1.5rem,4vw,2.25rem);margin:0;font-weight:800;">${title}</h1>
                        </div>
                    </div>
                </header>
                <section class="project-content grid gap-8 lg:grid-cols-[1fr_320px] mt-6">
                    <div>
                        <div class="content-card">
                            <h2 class="text-xl font-extrabold">Overview</h2>
                            <p class="mt-3 text-slate-700">${description}</p>
                        </div>
                        <div class="content-card mt-4">
                            <h3 class="text-lg font-semibold">Details</h3>
                            <ul class="mt-3 text-slate-700">
                                <li><strong>Demo:</strong> ${demoLink !== '#' ? '<a href="' + demoLink + '" target="_blank" rel="noreferrer">Open demo</a>' : 'Not available'}</li>
                                <li class="mt-2"><strong>Source:</strong> ${sourceLink !== '#' ? '<a href="' + sourceLink + '" target="_blank" rel="noreferrer">View repository</a>' : 'Not available'}</li>
                            </ul>
                        </div>
                    </div>
                    <aside>
                        <div class="content-card">
                            <h4 class="font-bold">Project Info</h4>
                            <div class="mt-3 text-slate-700">
                                <p><strong>Title</strong><br>${title}</p>
                            </div>
                            <div class="mt-4">
                                <a class="primary-button w-full" href="${demoLink}" target="_blank" rel="noreferrer">Open Demo</a>
                                <a class="secondary-button w-full mt-3" href="${sourceLink}" target="_blank" rel="noreferrer">Open Source</a>
                                <a class="secondary-button w-full mt-3" href="projects.html">Back to projects</a>
                            </div>
                        </div>
                    </aside>
                </section>
            `;

            if (window.lucide && lucide.createIcons) {
                lucide.createIcons();
            }
        }

        function setupNavigation() {
            const button = document.getElementById('mobile-menu-button');
            const menu = document.getElementById('mobile-menu');

            if (button && menu) {
                button.addEventListener('click', () => {
                    menu.classList.toggle('hidden');
                });

                menu.querySelectorAll('.mobile-link').forEach((link) => {
                    link.addEventListener('click', () => menu.classList.add('hidden'));
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const data = safeParseData();
            renderProjectDetail(data);
            setupNavigation();
            document.getElementById('year').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
